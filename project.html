<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project - Fazle Rabbi Zaki</title>
    <meta name="description" content="Project case study by Fazle Rabbi Zaki.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Project - Fazle Rabbi Zaki">
    <meta property="og:description" content="Aerospace engineering project case study.">
    <meta property="og:image" content="images/fazle_headshot.jpg">
    <link rel="icon" type="image/png" href="images/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif']
            }
          }
        }
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
      .gradient-text {
        background: linear-gradient(135deg, #0f766e, #2563eb 60%, #b7791f);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .nav-glass {
        background: rgba(248, 250, 252, 0.9);
        border-bottom: 1px solid rgba(148, 163, 184, 0.25);
        backdrop-filter: blur(18px);
      }

      .dark .nav-glass {
        background: rgba(15, 23, 42, 0.9);
        border-bottom-color: rgba(148, 163, 184, 0.18);
      }

      .hero-shell {
        background:
          linear-gradient(90deg, rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.7)),
          linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
          #0f172a;
        background-size: auto, 32px 32px, 32px 32px, auto;
      }

      .project-visual {
        background:
          linear-gradient(135deg, rgba(15, 118, 110, 0.94), rgba(37, 99, 235, 0.76)),
          linear-gradient(rgba(255, 255, 255, 0.14) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.12) 1px, transparent 1px);
        background-size: auto, 22px 22px, 22px 22px;
      }

      .tag {
        border: 1px solid rgba(20, 184, 166, 0.22);
        background: rgba(20, 184, 166, 0.14);
        color: #ccfbf1;
      }

      .prose-lite h2 {
        margin-top: 2.5rem;
        margin-bottom: 1rem;
        font-size: 1.65rem;
        line-height: 1.2;
        font-weight: 800;
        letter-spacing: 0;
      }

      .prose-lite h3 {
        margin-top: 1.8rem;
        margin-bottom: 0.75rem;
        font-size: 1.18rem;
        font-weight: 800;
      }

      .prose-lite p,
      .prose-lite li {
        color: #334155;
        line-height: 1.78;
      }

      .dark .prose-lite p,
      .dark .prose-lite li {
        color: #cbd5e1;
      }

      .prose-lite ul,
      .prose-lite ol {
        padding-left: 1.25rem;
        margin: 1rem 0;
      }

      .prose-lite ul {
        list-style: disc;
      }

      .prose-lite ol {
        list-style: decimal;
      }

      .prose-lite table {
        width: 100%;
        border-collapse: collapse;
        margin: 1.5rem 0;
        font-size: 0.92rem;
      }

      .prose-lite th,
      .prose-lite td {
        border: 1px solid #dbe3ef;
        padding: 0.75rem;
        text-align: left;
        vertical-align: top;
      }

      .dark .prose-lite th,
      .dark .prose-lite td {
        border-color: #263244;
      }

      .prose-lite th {
        background: #f1f5f9;
        font-weight: 800;
      }

      .dark .prose-lite th {
        background: #111827;
      }

      .prose-lite img {
        width: 100%;
        border-radius: 8px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        margin: 1.5rem 0;
      }
    </style>
  </head>

  <body class="bg-slate-50 dark:bg-slate-950 text-slate-950 dark:text-slate-100 font-sans transition-colors duration-300">
    <nav class="sticky top-0 z-50 nav-glass">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between gap-4">
        <a href="index.html#projects" class="text-sm font-bold text-teal-700 dark:text-teal-300 hover:underline inline-flex items-center">
          <i class="fa-solid fa-arrow-left mr-2"></i>Back to Projects
        </a>
        <button id="theme-toggle" class="h-10 w-10 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" aria-label="Toggle theme">
          <i class="fas fa-moon dark:hidden"></i>
          <i class="fas fa-sun hidden dark:block"></i>
        </button>
      </div>
    </nav>

    <header class="hero-shell relative overflow-hidden text-white">
      <img id="heroImg" class="absolute inset-0 h-full w-full object-cover opacity-28 hidden" alt="">
      <div id="heroVisual" class="absolute inset-y-0 right-0 w-full lg:w-1/2 project-visual opacity-25"></div>
      <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20 md:py-24">
        <div class="max-w-4xl">
          <p id="subtitle" class="text-sm font-extrabold uppercase tracking-[0.16em] text-teal-200 mb-4"></p>
          <h1 id="title" class="text-4xl md:text-6xl font-extrabold tracking-tight leading-tight">Project</h1>
          <div class="mt-6 flex flex-wrap gap-3 text-sm text-slate-200">
            <span id="dates" class="inline-flex items-center"></span>
            <span id="location" class="inline-flex items-center"></span>
          </div>
          <div id="tags" class="mt-6 flex flex-wrap gap-2"></div>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 grid grid-cols-1 lg:grid-cols-[minmax(0,1fr)_320px] gap-10">
      <article class="min-w-0">
        <p id="summary" class="text-xl leading-8 text-slate-700 dark:text-slate-300 mb-8"></p>
        <nav id="toc" class="hidden mb-10 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5">
          <h2 class="text-sm font-extrabold uppercase tracking-[0.14em] text-slate-500 dark:text-slate-400 mb-3">On This Page</h2>
          <ul id="tocList" class="flex flex-wrap gap-x-5 gap-y-2 text-sm font-semibold text-teal-700 dark:text-teal-300"></ul>
        </nav>
        <div id="caseContent" class="prose-lite"></div>
        <div id="comingSoon" class="hidden rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-6 text-slate-600 dark:text-slate-300">
          Case study content is not available yet.
        </div>
      </article>

      <aside class="lg:pt-2">
        <div class="lg:sticky lg:top-24 space-y-5">
          <section class="rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5">
            <h2 class="text-sm font-extrabold uppercase tracking-[0.14em] text-slate-500 dark:text-slate-400 mb-4">Key Metrics</h2>
            <ul id="metrics" class="space-y-3 text-sm leading-6 text-slate-700 dark:text-slate-300"></ul>
          </section>
          <section class="rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-5">
            <h2 class="text-sm font-extrabold uppercase tracking-[0.14em] text-slate-500 dark:text-slate-400 mb-4">Links</h2>
            <div id="links" class="space-y-2"></div>
          </section>
        </div>
      </aside>
    </main>

    <footer class="py-8 text-center text-sm text-slate-500 dark:text-slate-400">
      <p>&copy; <span id="year"></span> Fazle Rabbi Zaki</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
    <script src="js/project.js"></script>
  </body>
</html>
